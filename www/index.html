<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none';
           style-src 'self';
           script-src 'self';
           connect-src https://rename.seraf1.fr;
           img-src 'none';
           font-src 'none';
           object-src 'none';
           base-uri 'none';
           form-action 'none';" />
<title>Renamer</title>
<link rel="stylesheet" href="css/fallback.css" />
</head>
<body>
  <!--
    Page locale de secours : ne s'affiche QUE si le WebView Capacitor n'a pas
    pu charger https://rename.seraf1.fr (voir onReceivedError dans
    MainActivity.java). Retente la connexion puis y renavigue normalement,
    ce qui réattribue le bridge Capacitor à la page distante.
  -->
  <div class="spinner"></div>
  <div class="title" id="status-title">Hors ligne</div>
  <div class="hint" id="status-hint">Nouvelle tentative dans quelques secondes…</div>

<script src="js/fallback.js"></script>
</body>
</html>
